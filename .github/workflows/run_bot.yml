name: Run ICT/SMC Bot

on:
  schedule:
    - cron: '30 3 * * 1-5'  # Runs at 9:00 AM IST (approx NSE open)
  workflow_dispatch:      # Allows manual trigger

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install smartapi-python pyotp logzero websocket-client pycryptodome

      - name: Run Bot
        env:
          API_KEY: ${{ secrets.API_KEY }}
          CLIENT_CODE: ${{ secrets.CLIENT_CODE }}
          PIN: ${{ secrets.PIN }}
          TOTP_SECRET: ${{ secrets.TOTP_SECRET }}
        run: python ict_smc_smartapi_bot.py
