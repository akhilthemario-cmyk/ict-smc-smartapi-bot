name: Run ICT/SMC Bot

on:
  schedule:
    # Runs every 15 minutes during Indian Market Hours (9:15 AM - 3:30 PM IST)
    # 03:45 UTC to 10:00 UTC covers 09:15 to 15:30 IST
    - cron: '*/15 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install smartapi-python pyotp

      - name: Run Bot
        env:
          API_KEY: ${{ secrets.API_KEY }}
          CLIENT_CODE: ${{ secrets.CLIENT_CODE }}
          PIN: ${{ secrets.PIN }}
          TOTP_SECRET: ${{ secrets.TOTP_SECRET }}
        run: python ict_smc_smartapi_bot.py
